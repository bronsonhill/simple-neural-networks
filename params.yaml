data:
  test_split: 0.2
  random_seed: 42

features:
  method: "embedding"
  max_vocab_size: 8000
  min_doc_freq: 1
  embedding_dim: 50
  embedding_pooling: "mean"

train:
  hidden_layers: [32]
  activation: "relu"
  learning_rate: 0.05
  momentum: 0.9
  epochs: 100
  batch_size: 32
  random_seed: 42

evaluate:
  threshold: 0.5
